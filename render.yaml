services:
  - type: web
    name: zentivra-backend
    runtime: python
    rootDir: backend
    buildCommand: >-
      apt-get install -y libcairo2 libpango-1.0-0 libpangocairo-1.0-0
      libgdk-pixbuf2.0-0 libffi-dev shared-mime-info &&
      pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      # App
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO

      # Database (SQLite — data resets on redeploy; acceptable for demo)
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./zentivra.db

      # CORS — set this to your Vercel frontend URL after deploying
      # e.g. https://zentivra.vercel.app,http://localhost:3000
      - key: ALLOWED_ORIGINS
        sync: false

      # LLM — set at least one
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false

      # Email delivery (optional — leave blank to disable)
      - key: SENDGRID_API_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_RECIPIENTS
        sync: false

      # Scheduling
      - key: DIGEST_TIME
        value: "06:00"
      - key: TIMEZONE
        value: Asia/Kolkata
